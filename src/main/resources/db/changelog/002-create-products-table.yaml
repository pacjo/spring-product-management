databaseChangeLog:
  - changeSet:
      id: 002-create-products-table
      author: system
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: producer_id
            constraintName: fk_products_producer
            referencedTableName: producers
            referencedColumnNames: id
        - createIndex:
            indexName: idx_products_name
            tableName: products
            columns:
              - column:
                  name: name
        - createIndex:
            indexName: idx_products_producer_id
            tableName: products
            columns:
              - column:
                  name: producer_id